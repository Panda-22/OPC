<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>投资适配性分析报告</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 40px; background: #fafafa; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #1a1a2e; font-size: 24px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    .section { margin: 25px 0; }
    .section-title { color: #2d3436; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
    .conclusion { background: #f8f9fa; padding: 15px; border-left: 4px solid #3498db; border-radius: 4px; line-height: 1.6; }
    .dimensions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .dim-card { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 6px; }
    .dim-name { color: #666; font-size: 13px; }
    .dim-score { color: #2c3e50; font-size: 24px; font-weight: bold; }
    .dim-label { color: #999; font-size: 12px; }
    .score-bar { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .score-fill { height: 100%; background: #3498db; }
    .recommendations { list-style: none; padding: 0; }
    .recommendations li { background: #f0f9ff; padding: 12px 15px; margin: 8px 0; border-radius: 4px; border-left: 3px solid #3498db; }
    .footer { text-align: center; color: #999; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
    @media print { body { background: #fff; } .container { box-shadow: none; } }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="reportTitle">投资适配性分析报告</h1>
    
    <div class="section">
      <div class="section-title">一、核心结论</div>
      <div class="conclusion" id="coreConclusion">
        正在加载分析数据...
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">二、维度得分对比</div>
      <div class="dimensions" id="dimensions">
        <div class="dim-card">
          <div class="dim-name">资金匹配度</div>
          <div class="dim-score" id="dim1Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim1Bar" style="width:0%"></div></div>
        </div>
        <div class="dim-card">
          <div class="dim-name">经验匹配度</div>
          <div class="dim-score" id="dim2Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim2Bar" style="width:0%"></div></div>
        </div>
        <div class="dim-card">
          <div class="dim-name">时间/心态匹配度</div>
          <div class="dim-score" id="dim3Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim3Bar" style="width:0%"></div></div>
        </div>
        <div class="dim-card">
          <div class="dim-name">区域匹配度</div>
          <div class="dim-score" id="dim4Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim4Bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">三、建议</div>
      <ul class="recommendations" id="recommendations">
        <li>正在加载建议...</li>
      </ul>
    </div>
    
    <div class="footer" id="footer">
      生成时间: -
    </div>
  </div>

  <script>
    // 从URL参数获取数据
    const params = new URLSearchParams(window.location.search);
    const data = params.get('data');
    
    if (data) {
      try {
        const report = JSON.parse(decodeURIComponent(data));
        
        document.getElementById('reportTitle').textContent = report.title || '投资适配性分析报告';
        document.getElementById('coreConclusion').textContent = report.core_conclusion || '暂无';
        
        // 维度得分
        const dims = report.dimension_scores || [];
        dims.forEach((d, i) => {
          const score = d.score || 0;
          const el = i + 1;
          document.getElementById('dim' + el + 'Score').textContent = score;
          document.getElementById('dim' + el + 'Bar').style.width = (score / 25 * 100) + '%';
        });
        
        // 建议
        const suggs = report.suggestions || [];
        if (suggs.length > 0) {
          document.getElementById('recommendations').innerHTML = suggs.map(s => '<li>' + s + '</li>').join('');
        } else {
          document.getElementById('recommendations').innerHTML = '<li>暂无建议</li>';
        }
        
        // 时间
        document.getElementById('footer').textContent = '生成时间: ' + new Date().toLocaleString('zh-CN');
        
      } catch (e) {
        console.error(e);
      }
    }
  </script>
</body>
</html>
