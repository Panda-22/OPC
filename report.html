<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>投资适配性分析报告</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 40px; background: #fafafa; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #1a1a2e; font-size: 24px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    .section { margin: 25px 0; }
    .section-title { color: #2d3436; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
    .conclusion { background: #f8f9fa; padding: 15px; border-left: 4px solid #3498db; border-radius: 4px; line-height: 1.6; }
    .dimensions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .dim-card { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 6px; }
    .dim-name { color: #666; font-size: 13px; }
    .dim-score { color: #2c3e50; font-size: 24px; font-weight: bold; }
    .dim-label { color: #999; font-size: 12px; }
    .score-bar { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .score-fill { height: 100%; background: #3498db; }
    .recommendations { list-style: none; padding: 0; }
    .recommendations li { background: #f0f9ff; padding: 12px 15px; margin: 8px 0; border-radius: 4px; border-left: 3px solid #3498db; }
    .footer { text-align: center; color: #999; font-size: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
    .radar-container { text-align: center; margin: 20px 0; }
    .radar-chart { display: inline-block; max-width: 100%; }
    .risk-level { text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 8px; color: #fff; margin: 20px 0; }
    .risk-level .level-title { font-size: 14px; opacity: 0.9; }
    .risk-level .level-value { font-size: 32px; font-weight: bold; margin: 10px 0; }
    .risk-level .level-desc { font-size: 13px; opacity: 0.8; }
    @media print { body { background: #fff; } .container { box-shadow: none; } }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="reportTitle">投资适配性分析报告</h1>
    
    <div class="section">
      <div class="risk-level">
        <div class="level-title">风险适配等级</div>
        <div class="level-value" id="riskLevel">-</div>
        <div class="level-desc" id="riskDesc">评估中...</div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">一、核心结论</div>
      <div class="conclusion" id="coreConclusion">
        正在加载分析数据...
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">二、维度雷达图</div>
      <div class="radar-container">
        <canvas id="radarChart" class="radar-chart" width="350" height="350"></canvas>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">三、维度得分对比</div>
      <div class="dimensions" id="dimensions">
        <div class="dim-card">
          <div class="dim-name">资金匹配度</div>
          <div class="dim-score" id="dim1Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim1Bar" style="width:0%"></div></div>
        </div>
        <div class="dim-card">
          <div class="dim-name">经验匹配度</div>
          <div class="dim-score" id="dim2Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim2Bar" style="width:0%"></div></div>
        </div>
        <div class="dim-card">
          <div class="dim-name">时间/心态匹配度</div>
          <div class="dim-score" id="dim3Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim3Bar" style="width:0%"></div></div>
        </div>
        <div class="dim-card">
          <div class="dim-name">区域匹配度</div>
          <div class="dim-score" id="dim4Score">-</div>
          <div class="dim-label">/25</div>
          <div class="score-bar"><div class="score-fill" id="dim4Bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">四、建议</div>
      <ul class="recommendations" id="recommendations">
        <li>正在加载建议...</li>
      </ul>
    </div>
    
    <div class="footer" id="footer">
      生成时间: -
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get('data');
    
    if (data) {
      try {
        const report = JSON.parse(decodeURIComponent(data));
        
        document.getElementById('reportTitle').textContent = report.title || '投资适配性分析报告';
        document.getElementById('coreConclusion').textContent = report.core_conclusion || '暂无';
        
        // Risk level from conclusion
        const conclusion = report.core_conclusion || '';
        if (conclusion.includes('高度适配')) {
          document.getElementById('riskLevel').textContent = '高度适配';
          document.getElementById('riskDesc').textContent = '您的投资条件与项目高度匹配';
        } else if (conclusion.includes('中度适配')) {
          document.getElementById('riskLevel').textContent = '中度适配';
          document.getElementById('riskDesc').textContent = '您的投资条件与项目匹配度一般';
        } else if (conclusion.includes('轻度适配')) {
          document.getElementById('riskLevel').textContent = '轻度适配';
          document.getElementById('riskDesc').textContent = '建议详细评估后决策';
        } else if (conclusion.includes('不推荐')) {
          document.getElementById('riskLevel').textContent = '不推荐';
          document.getElementById('riskDesc').textContent = '风险较高，请谨慎';
        } else {
          document.getElementById('riskLevel').textContent = '待评估';
          document.getElementById('riskDesc').textContent = '分析中...';
        }
        
        // Radar chart
        const radarPoints = report.radar_points || report.dimension_scores || [];
        drawRadar(radarPoints);
        
        // Dimension scores
        const dims = report.dimension_scores || [];
        dims.forEach((d, i) => {
          const score = d.score || 0;
          const el = i + 1;
          const scoreEl = document.getElementById('dim' + el + 'Score');
          const barEl = document.getElementById('dim' + el + 'Bar');
          if (scoreEl) scoreEl.textContent = score;
          if (barEl) barEl.style.width = (score / 25 * 100) + '%';
        });
        
        // Suggestions
        const suggs = report.suggestions || [];
        if (suggs.length > 0) {
          document.getElementById('recommendations').innerHTML = suggs.map(s => '<li>' + s + '</li>').join('');
        } else {
          document.getElementById('recommendations').innerHTML = '<li>暂无建议</li>';
        }
        
        // Time
        document.getElementById('footer').textContent = '生成时间: ' + new Date().toLocaleString('zh-CN');
        
      } catch (e) {
        console.error(e);
      }
    }
    
    function drawRadar(points) {
      const canvas = document.getElementById('radarChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = Math.min(w, h) / 2 - 40;
      
      ctx.clearRect(0, 0, w, h);
      const n = Math.max(4, points.length);
      
      // Grid
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;
      for (let r = radius / 4; r <= radius; r += radius / 4) {
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
          const a = (i / n) * Math.PI * 2 - Math.PI / 2;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
      
      // Axes
      ctx.strokeStyle = '#ccc';
      for (let i = 0; i < n; i++) {
        const a = (i / n) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
        ctx.stroke();
      }
      
      // Labels
      ctx.fillStyle = '#666';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < n; i++) {
        const a = (i / n) * Math.PI * 2 - Math.PI / 2;
        const label = points[i]?.label || ('维度' + (i + 1));
        const x = cx + Math.cos(a) * (radius + 25);
        const y = cy + Math.sin(a) * (radius + 25);
        ctx.fillText(label, x, y + 4);
      }
      
      // Data polygon
      if (points.length > 0) {
        ctx.beginPath();
        points.forEach((p, i) => {
          const a = (i / points.length) * Math.PI * 2 - Math.PI / 2;
          const val = Math.min(25, p.value || p.score || 0);
          const r = (val / 25) * radius;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fillStyle = 'rgba(52, 152, 219, 0.3)';
        ctx.fill();
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Points
        points.forEach((p, i) => {
          const a = (i / points.length) * Math.PI * 2 - Math.PI / 2;
          const val = Math.min(25, p.value || p.score || 0);
          const r = (val / 25) * radius;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fillStyle = '#3498db';
          ctx.fill();
        });
      }
    }
  </script>
</body>
</html>
